name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: ".nvmrc"

      - name: Install PNPM
        # Must be pnpm >= 10: pnpm-workspace.yaml holds the allowBuilds config
        # (a pnpm 10+ key); pnpm 9 treats the file as a workspace definition and
        # aborts install with "packages field missing or empty".
        run: npm install -g pnpm@11

      - name: Install dependencies
        run: pnpm install
      - name: Check formatting
        run: pnpm format
      - name: Check linter
        run: pnpm lint
