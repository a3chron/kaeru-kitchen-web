# Postinstall build scripts must be explicitly approved since pnpm 10.
# `allowBuilds` is the pnpm 11 form, `onlyBuiltDependencies` the pnpm 10 one —
# keep both in sync. sharp powers Next.js image optimization, esbuild is pulled
# in by drizzle-kit, unrs-resolver by eslint-config-next.
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
onlyBuiltDependencies:
  - sharp
  - unrs-resolver
  - esbuild
